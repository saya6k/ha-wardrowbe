get_summary:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: wardrowbe
    exclude_statuses:
      example: '["rejected", "skipped"]'
      selector:
        select:
          multiple: true
          mode: list
          custom_value: false
          options:
            - pending
            - accepted
            - rejected
            - skipped
    include_statuses:
      example: '["pending", "accepted"]'
      selector:
        select:
          multiple: true
          mode: list
          custom_value: false
          options:
            - pending
            - accepted
            - rejected
            - skipped
