suggest_outfit:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: wardrowbe
    occasion:
      example: casual
      selector:
        select:
          translation_key: common_occasions
          mode: dropdown
          custom_value: false
          options:
            - beach
            - brunch
            - business-casual
            - casual
            - date
            - dinner
            - formal
            - gym
            - hiking
            - interview
            - lounge
            - office
            - outdoor
            - party
            - running
            - smart-casual
            - sport
            - sporty
            - travel
            - wedding
            - weekend
            - work
    time_of_day:
      example: morning
      selector:
        select:
          translation_key: common_time_of_day
          mode: dropdown
          custom_value: false
          options:
            - morning
            - afternoon
            - evening
            - night
            - "full day"
    target_date:
      example: "2026-05-08"
      selector:
        date:
    notes:
      selector:
        text:
          multiline: true

accept_outfit:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: wardrowbe
    outfit_id:
      example: "abc123"
      selector:
        text:

